name: Validate Band 10 Pro P67 source

on:
  push:
    paths:
      - 'README.md'
      - 'source/README.md'
      - 'source/miband10pro/**'
      - 'source/app.json'
      - 'source/app.bin'
      - '.github/workflows/validate-band10pro.yml'
  pull_request:
    paths:
      - 'README.md'
      - 'source/README.md'
      - 'source/miband10pro/**'
      - 'source/app.json'
      - 'source/app.bin'
      - '.github/workflows/validate-band10pro.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compile Python helpers
        run: >-
          python -m py_compile
          source/miband10pro/tools/prepare_assets.py
          source/miband10pro/tools/validate_project.py
          source/miband10pro/tools/validate_target_profiles.py
          source/miband10pro/tools/inspect_watchface_package.py
          source/miband10pro/tools/build_app_json.py
          source/miband10pro/tools/apply_target_profile.py
          source/miband10pro/tools/build_micreate_probe.py
          source/miband10pro/tools/extract_p67_profile.py
          source/miband10pro/tools/check_no_legacy_canvas.py
          source/miband10pro/tools/test_p67_resource_header.py
          source/miband10pro/tools/inspect_p67_binary.py
          source/miband10pro/tools/test_p67_binary_layout.py

      - name: Validate source checkout
        run: >-
          python source/miband10pro/tools/validate_project.py
          source/miband10pro/project --source-only

      - name: Validate target profile schema JSON
        run: >-
          python -m json.tool
          source/miband10pro/project/targets/profile.schema.json
          > /dev/null

      - name: Validate target evidence profiles
        run: >-
          python source/miband10pro/tools/validate_target_profiles.py
          source/miband10pro/project/targets

      - name: Reject removed canvas identifiers
        run: >-
          python source/miband10pro/tools/check_no_legacy_canvas.py
          README.md source .github/workflows

      - name: Rebuild verified P67 profile from sanitized fixture
        run: |
          python source/miband10pro/tools/extract_p67_profile.py \
            source/miband10pro/reference/real-device/P67-baseline \
            --profile-out /tmp/p67-336x480.json \
            --report-json /tmp/p67-report.json \
            --report-markdown /tmp/p67-report.md
          python -m json.tool /tmp/p67-report.json > /dev/null
          test -s /tmp/p67-report.md

      - name: Compare rebuilt P67 profile with committed profile
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          generated = json.loads(Path('/tmp/p67-336x480.json').read_text(encoding='utf-8'))
          committed = json.loads(Path('source/miband10pro/project/targets/p67-336x480.json').read_text(encoding='utf-8'))
          if generated != committed:
              raise SystemExit('generated P67 profile differs from committed profile')
          print('Generated P67 profile matches committed profile')
          PY

      - name: Test P67 resource.bin header parser
        run: >-
          python source/miband10pro/tools/test_p67_resource_header.py

      - name: Test P67 extended theme and record tables
        run: >-
          python source/miband10pro/tools/test_p67_binary_layout.py

      - name: Apply P67 geometry to legacy visual prototype
        shell: bash
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          cp -R source/miband10pro/project/. "$workdir/"
          python source/miband10pro/tools/apply_target_profile.py \
            "$workdir" \
            source/miband10pro/project/targets/p67-336x480.json
          python source/miband10pro/tools/validate_project.py "$workdir" --source-only
          rm -rf "$workdir"

      - name: Smoke-test package inspector
        run: |
          python source/miband10pro/tools/inspect_watchface_package.py \
            source/app.json \
            --json /tmp/app-inspection.json \
            --markdown /tmp/app-inspection.md
          python -m json.tool /tmp/app-inspection.json > /dev/null
          test -s /tmp/app-inspection.md
