name: Validate watchface source

on:
  push:
    paths:
      - 'source/miband10pro/**'
      - '.github/workflows/validate-watchface.yml'
  pull_request:
    paths:
      - 'source/miband10pro/**'
      - '.github/workflows/validate-watchface.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate default source profile
        run: |
          python source/miband10pro/tools/validate_project.py source/miband10pro/project --source-only

      - name: Test both target profiles
        run: |
          cp -R source/miband10pro/project /tmp/watchface-profile-test
          python source/miband10pro/tools/apply_target_profile.py \
            /tmp/watchface-profile-test \
            source/miband10pro/project/targets/compat-336x480.json
          python source/miband10pro/tools/validate_project.py /tmp/watchface-profile-test --source-only
          python source/miband10pro/tools/apply_target_profile.py \
            /tmp/watchface-profile-test \
            source/miband10pro/project/targets/experimental-400x480.json
          python source/miband10pro/tools/validate_project.py /tmp/watchface-profile-test --source-only

      - name: Test app.json generation path
        run: |
          python source/miband10pro/tools/build_app_json.py \
            source/miband10pro/project/device/app.json.example \
            /tmp/app.json \
            --platform-name UNVERIFIED-CI \
            --device-source 1 \
            --design-width 336
          python -m json.tool /tmp/app.json >/dev/null
